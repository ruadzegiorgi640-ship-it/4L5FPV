        // მომხმარებლის მიერ ხელით მონიშნული პასუხები (მხოლოდ სესიის განმავლობაში)
        const userMarked = {};

        // გვერდზე ელემენტების დინამიკური გენერირება
        const questionsListContainer = document.getElementById('questions-list');
        const searchInput = document.getElementById('search-input');
        const backToTopBtn = document.getElementById('back-to-top');

        function renderAllQuestions(filterText = '') {
            questionsListContainer.innerHTML = '';

            const filtered = fullDatabase.filter(q => {
                const searchLower = filterText.toLowerCase();
                const matchesText = q.text.toLowerCase().includes(searchLower);
                const matchesId = q.id.toString() === searchLower;
                const matchesAnswers = q.answers.some(a => a.text.toLowerCase().includes(searchLower));
                return matchesText || matchesId || matchesAnswers;
            });

            if (filtered.length === 0) {
                questionsListContainer.innerHTML = `
                    <div class="glass-card rounded-2xl p-8 text-center text-gray-500">
                        🔍 შესაბამისი კითხვა ვერ მოიძებნა.
                    </div>
                `;
                return;
            }

            filtered.forEach(q => {
                const card = document.createElement('div');
                card.className = "glass-card rounded-2xl p-6 shadow-xl space-y-4 hover:border-gray-700 transition-colors";

                let imageHtml = '';
                if (q.image) {
                    imageHtml = `
                        <div class="bg-slate-900/40 p-4 rounded-xl border border-gray-800 text-center">
                            <img src="${q.image}" alt="საკითხავი სურათი" class="mx-auto rounded-lg max-h-48 object-contain">
                        </div>
                    `;
                }

                const effectiveCorrect = q.correct || userMarked[q.id] || null;

                let answersHtml = '<div class="space-y-2.5">';
                q.answers.forEach(ans => {
                    const isCorrect = ans.key === effectiveCorrect;
                    const isUserMarked = !q.correct && userMarked[q.id] === ans.key;
                    const ansStyle = isCorrect
                        ? (isUserMarked
                            ? 'bg-sky-500/10 border-sky-500/80 text-sky-300 font-medium'
                            : 'bg-emerald-500/10 border-emerald-500/80 text-emerald-300 font-medium green-glow')
                        : 'bg-gray-900/30 border-gray-800/80 text-gray-400 hover:border-gray-700 cursor-pointer';

                    const badgeStyle = isCorrect
                        ? (isUserMarked ? 'bg-sky-500 text-slate-950' : 'bg-emerald-500 text-slate-950')
                        : 'bg-gray-800 text-gray-500';

                    const clickAttr = q.correct ? '' : `data-qid="${q.id}" data-key="${ans.key}"`;

                    answersHtml += `
                        <div class="flex items-center gap-3 p-3.5 rounded-xl border ${ansStyle}" ${clickAttr}>
                            <span class="w-7 h-7 rounded-full flex items-center justify-center text-xs font-bold ${badgeStyle}">
                                ${ans.key}
                            </span>
                            <span class="text-sm md:text-base">${ans.text}</span>
                        </div>
                    `;
                });
                answersHtml += '</div>';

                let noteHtml = '';
                if (!q.correct) {
                    noteHtml = `<p class="text-xs text-amber-400/80">⚠️ სწორი პასუხი PDF-ში მონიშნული არ არის — დააჭირეთ სასურველ ვარიანტს მის მოსანიშნად.</p>`;
                }

                card.innerHTML = `
                    <div class="flex justify-between items-start gap-4">
                        <h3 class="font-bold text-white text-base md:text-lg leading-relaxed">
                            <span class="text-emerald-400 font-mono text-lg mr-1.5">#${q.id}</span>
                            ${q.text}
                        </h3>
                    </div>
                    ${imageHtml}
                    ${answersHtml}
                    ${noteHtml}
                `;

                questionsListContainer.appendChild(card);
            });

            // ხელით მონიშვნის ივენთები
            questionsListContainer.querySelectorAll('[data-qid]').forEach(el => {
                el.addEventListener('click', () => {
                    const qid = el.getAttribute('data-qid');
                    const key = el.getAttribute('data-key');
                    userMarked[qid] = key;
                    renderAllQuestions(searchInput.value);
                });
            });
        }

        // ძებნის ივენთი
        searchInput.addEventListener('input', (e) => {
            renderAllQuestions(e.target.value);
        });

        // Back to Top ლოგიკა
        window.addEventListener('scroll', () => {
            if (window.scrollY > 400) {
                backToTopBtn.classList.remove('opacity-0', 'pointer-events-none');
            } else {
                backToTopBtn.classList.add('opacity-0', 'pointer-events-none');
            }
        });

        backToTopBtn.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // საწყისი ჩატვირთვა
        renderAllQuestions();
    </script>
